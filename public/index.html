<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Customer</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
padding-top:70px;
padding-bottom:70px;
}

header{
position:fixed;
top:0;
left:0;
right:0;
height:70px;
background:#000;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 15px;
z-index:1000;
}

.logo{
height:45px;
width:45px;
border-radius:50%;
object-fit:cover;
}

.brand{
height:34px;
object-fit:contain;
}

#currentLocation{
color:white;
font-size:24px;
cursor:pointer;
}

.theme{
padding:18px;
text-align:center;
font-size:18px;
font-weight:bold;
color:#333;
}

section{
display:none;
padding:20px;
}

section.active{
display:block;
}

footer{
position:fixed;
bottom:0;
left:0;
right:0;
height:65px;
background:#000;
display:flex;
justify-content:space-around;
align-items:center;
z-index:1000;
}

footer button{
background:none;
border:none;
color:white;
font-size:22px;
cursor:pointer;
display:flex;
flex-direction:column;
align-items:center;
gap:4px;
}

footer span{
font-size:11px;
}

#popup{
position:fixed;
top:-120px;
left:50%;
transform:translateX(-50%);
background:#222;
color:white;
padding:14px 20px;
border-radius:12px;
transition:.4s;
z-index:2000;
min-width:260px;
text-align:center;
}

#popup.show{
top:90px;
}

</style>
</head>

<body>

<div id="popup"></div>

<header>

<img
class="logo"
src="https://res.cloudinary.com/gb2xbn6d/image/upload/v1784683105/logo_lo1ye5.jpg">

<img
class="brand"
src="https://res.cloudinary.com/gb2xbn6d/image/upload/v1784683105/logo-white_shadow_i6dptc.webp">

<i class="fa-solid fa-rotate-right"
id="currentLocation"></i>

</header>

<div class="theme">
Shop your nearest stores in one tap.
</div>

<section id="home" class="active">
<h2>Home</h2>
</section>

<section id="cart">
<h2>Cart</h2>
</section>

<section id="orders">
<h2>Orders</h2>
</section>

<section id="favourite">
<h2>Favourite</h2>
</section>

<section id="profile">
<h2>Profile</h2>
</section>

<footer>

<button onclick="showSection('orders')">
<i class="fa-solid fa-box"></i>
<span>Orders</span>
</button>

<button onclick="showSection('cart')">
<i class="fa-solid fa-cart-shopping"></i>
<span>Cart</span>
</button>

<button onclick="showSection('home')">
<i class="fa-solid fa-house"></i>
<span>Home</span>
</button>

<button onclick="showSection('favourite')">
<i class="fa-regular fa-heart"></i>
<span>Favourite</span>
</button>

<button onclick="showSection('profile')">
<i class="fa-regular fa-user"></i>
<span>Profile</span>
</button>

</footer>

<script>

function showSection(id){

document.querySelectorAll("section").forEach(s=>{
s.classList.remove("active");
});

document.getElementById(id).classList.add("active");

}

function popup(text){

const p=document.getElementById("popup");

p.innerText=text;

p.classList.add("show");

setTimeout(()=>{
p.classList.remove("show");
},2500);

}

document.getElementById("currentLocation").onclick=function(){

popup("Retrieving location...");

if(!navigator.geolocation){

popup("Location not supported");

return;

}

navigator.geolocation.getCurrentPosition(

(position)=>{

const lat=position.coords.latitude;
const lng=position.coords.longitude;

localStorage.setItem("customerLocation",JSON.stringify({

latitude:lat,
longitude:lng

}));

popup("Current location updated");

},

(error)=>{

popup(error.message);

},

{

enableHighAccuracy:true

}

);

};

</script>

</body>
</html>
