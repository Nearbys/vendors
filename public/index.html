<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nearbys Business Registration</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:Arial,Helvetica,sans-serif;
    background:#f4f4f4;
}

.container{

    width:95%;
    max-width:420px;

    margin:40px auto;

    background:#fff;

    padding:25px;

    border-radius:12px;

    box-shadow:0 0 10px rgba(0,0,0,.12);

}

h2{

    text-align:center;
    color:#009500;
    margin-bottom:25px;

}

label{

    display:block;
    margin-bottom:6px;
    font-weight:bold;

}

input,
select{

    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:16px;

}

button{

    width:100%;
    padding:13px;

    border:none;

    border-radius:6px;

    background:#009500;

    color:#fff;

    font-size:16px;

    cursor:pointer;

}

button:hover{

    background:#007b00;

}

button:disabled{

    background:#4CAF50;
    cursor:default;

}

#deliveryFeeRow{

    display:none;

}

.input-row{

    display:flex;
    align-items:center;
    gap:10px;

}

.input-row input{

    margin-bottom:0;

}

.unit{

    font-weight:bold;
    white-space:nowrap;

}

#result{

    margin-top:20px;

    text-align:center;

    font-weight:bold;

}

.success{

    color:#009500;

}

.error{

    color:red;

}

</style>

</head>

<body>

<div class="container">

<h2>Business Registration</h2>

<label>Business Name</label>

<label>Profile Picture</label>

<input
type="file"
id="profileImage"
accept="image/*">

<label>Cover Picture</label>

<input
type="file"
id="coverImage"
accept="image/*">    

<input
type="text"
id="businessName"
placeholder="Business Name">

<input
type="hidden"
id="latitude">

<input
type="hidden"
id="longitude">

<button
type="button"
id="locationButton"
onclick="getLocation()">

Retrieve Current Location

</button>

<br><br>

<label>Category</label>

<select id="category">

<option value="">Select Category</option>

<option value="Grocery">Grocery</option>

<option value="Cafeteria">Cafeteria</option>

<option value="Restaurant">Restaurant</option>

<option value="Other">Other</option>

</select>

<label>Delivery Fee</label>

<select
id="deliveryType"
onchange="toggleDeliveryFee()">

<option value="Free">Free</option>

<option value="Chargeable">Chargeable</option>

</select>

<div id="deliveryFeeRow">

<label>Delivery Fee</label>

<div class="input-row">

<input
type="number"
id="deliveryFee"
value="2"
min="0"
max="20">

<span class="unit">Dhs</span>

</div>

</div>

<label>Email</label>

<input
type="email"
id="email"
placeholder="Email Address">

<label>WhatsApp</label>

<input
type="tel"
id="whatsapp"
placeholder="WhatsApp Number">

<button onclick="submitForm()">

Register Business

</button>

<div id="result"></div>

</div>

<script>

function getLocation(){

    if(!navigator.geolocation){

        alert("Geolocation is not supported by your device.");
        return;

    }

    const btn=document.getElementById("locationButton");

    btn.disabled=true;
    btn.innerHTML="Retrieving Location...";

    navigator.geolocation.getCurrentPosition(

        function(position){

            document.getElementById("latitude").value=position.coords.latitude;
            document.getElementById("longitude").value=position.coords.longitude;

            btn.innerHTML="✓ Location Received";

        },

        function(){

            btn.disabled=false;
            btn.innerHTML="Retrieve Current Location";

            alert("Unable to retrieve your location.");

        }

    );

}

function toggleDeliveryFee(){

    const deliveryType=document.getElementById("deliveryType").value;
    const feeRow=document.getElementById("deliveryFeeRow");

    if(deliveryType==="Chargeable"){

        feeRow.style.display="block";

        if(document.getElementById("deliveryFee").value=="0"){

            document.getElementById("deliveryFee").value="2";

        }

    }else{

        feeRow.style.display="none";
        document.getElementById("deliveryFee").value="0";

    }

}

async function uploadToCloudinary(file){

    if(!file) return "";

    const formData=new FormData();

    formData.append("file",file);

    formData.append("upload_preset","business_images");

    const response=await fetch(
        "https://api.cloudinary.com/v1_1/gb2xbn6d/image/upload",
        {
            method:"POST",
            body:formData
        }
    );

    const data=await response.json();

    if(!response.ok){

        throw new Error("Cloudinary Upload Failed");

    }

    return data.secure_url;

}

async function submitForm(){

    const result=document.getElementById("result");

    result.className="";
    result.innerHTML="";

    const businessName=document.getElementById("businessName").value.trim();

    const latitude=document.getElementById("latitude").value;

    const longitude=document.getElementById("longitude").value;

    const category=document.getElementById("category").value;

    const deliveryType=document.getElementById("deliveryType").value;

    const deliveryFee=document.getElementById("deliveryFee").value;

    const email=document.getElementById("email").value.trim().toLowerCase();

    let whatsapp=document.getElementById("whatsapp").value.trim();

    const profileFile=document.getElementById("profileImage").files[0];

    const coverFile=document.getElementById("coverImage").files[0];

    whatsapp=whatsapp.replace(/[\s\-()]/g,"");

    if(businessName===""){

        result.className="error";
        result.innerHTML="Please enter Business Name.";
        return;

    }

    if(latitude===""){

        result.className="error";
        result.innerHTML="Please retrieve your location.";
        return;

    }

    if(category===""){

        result.className="error";
        result.innerHTML="Please select a category.";
        return;

    }

    if(deliveryType==="Chargeable"){

        const fee=parseInt(deliveryFee);

        if(isNaN(fee) || fee<0 || fee>20){

            result.className="error";
            result.innerHTML="Delivery fee must be between 0 and 20 Dhs.";
            return;

        }

    }

    const emailRegex=/^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    if(!emailRegex.test(email)){

        result.className="error";
        result.innerHTML="Please enter a valid email address.";
        return;

    }

    if(!whatsapp.startsWith("+")){

        result.className="error";
        result.innerHTML="WhatsApp number must include the country code (Example: +971501234567).";
        return;

    }

    const phoneRegex=/^\+[1-9]\d{6,14}$/;

    if(!phoneRegex.test(whatsapp)){

        result.className="error";
        result.innerHTML="Please enter a valid WhatsApp number.";
        return;

    }

    try{

        result.className="";
        result.innerHTML="Uploading images...";

        const profileImage=await uploadToCloudinary(profileFile);

        const coverImage=await uploadToCloudinary(coverFile);

        result.innerHTML="Registering Business...";

        const response=await fetch("/register",{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({

                businessName,
                latitude,
                longitude,
                category,
                deliveryType,
                deliveryFee,
                email,
                whatsapp,
                profileImage,
                coverImage

            })

        });

        const data=await response.json();

        if(response.ok){

            result.className="success";
            result.innerHTML=data.message;

            document.getElementById("businessName").value="";
            document.getElementById("category").selectedIndex=0;
            document.getElementById("deliveryType").selectedIndex=0;
            document.getElementById("deliveryFee").value="2";
            document.getElementById("email").value="";
            document.getElementById("whatsapp").value="";
            document.getElementById("latitude").value="";
            document.getElementById("longitude").value="";
            document.getElementById("profileImage").value="";
            document.getElementById("coverImage").value="";

            document.getElementById("locationButton").disabled=false;
            document.getElementById("locationButton").innerHTML="Retrieve Current Location";

            toggleDeliveryFee();

        }else{

            result.className="error";
            result.innerHTML=data.message;

        }

    }catch(err){

        console.error(err);

        result.className="error";
        result.innerHTML="Upload or Database Error.";

    }

}

toggleDeliveryFee();

</script>
</body>
</html>
