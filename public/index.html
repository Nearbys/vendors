<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nearbys Business Registration</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:Arial,Helvetica,sans-serif;
    background:#f4f4f4;
}

.container{

    width:95%;
    max-width:420px;

    margin:40px auto;

    background:#fff;

    padding:25px;

    border-radius:12px;

    box-shadow:0 0 10px rgba(0,0,0,.12);

}

h2{

    text-align:center;
    color:#009500;
    margin-bottom:25px;

}

label{

    display:block;
    margin-bottom:6px;
    font-weight:bold;

}

input,
select{

    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:16px;

}

button{

    width:100%;
    padding:13px;

    border:none;

    border-radius:6px;

    background:#009500;

    color:#fff;

    font-size:16px;

    cursor:pointer;

}

button:hover{

    background:#007b00;

}

button:disabled{

    background:#4CAF50;
    cursor:default;

}

#deliveryFeeRow{

    display:none;

}

.input-row{

    display:flex;
    align-items:center;
    gap:10px;

}

.input-row input{

    margin-bottom:0;

}

.unit{

    font-weight:bold;
    white-space:nowrap;

}

#result{

    margin-top:20px;

    text-align:center;

    font-weight:bold;

}

.success{

    color:#009500;

}

.error{

    color:red;

}

</style>

</head>

<body>

<div class="container">

<h2>Business Registration</h2>

<label>Business Name</label>

<input
type="text"
id="businessName"
placeholder="Business Name">

<input
type="hidden"
id="latitude">

<input
type="hidden"
id="longitude">

<button
type="button"
id="locationButton"
onclick="getLocation()">

Retrieve Current Location

</button>

<br><br>

<label>Category</label>

<select id="category">

<option value="">Select Category</option>

<option value="Grocery">Grocery</option>

<option value="Cafeteria">Cafeteria</option>

<option value="Restaurant">Restaurant</option>

<option value="Other">Other</option>

</select>

<label>Delivery Fee</label>

<select
id="deliveryType"
onchange="toggleDeliveryFee()">

<option value="Free">Free</option>

<option value="Chargeable">Chargeable</option>

</select>

<div id="deliveryFeeRow">

<label>Delivery Fee</label>

<div class="input-row">

<input
type="number"
id="deliveryFee"
value="2"
min="0"
max="20">

<span class="unit">Dhs</span>

</div>

</div>

<label>Email</label>

<input
type="email"
id="email"
placeholder="Email Address">

<label>WhatsApp</label>

<input
type="tel"
id="whatsapp"
placeholder="WhatsApp Number">

<button onclick="submitForm()">

Register Business

</button>

<div id="result"></div>

</div>

<script>

function getLocation(){

    if(!navigator.geolocation){

        alert("Geolocation is not supported.");

        return;

    }

    const btn=document.getElementById("locationButton");

    btn.innerHTML="Retrieving...";

    btn.disabled=true;

    navigator.geolocation.getCurrentPosition(

        function(position){

            document.getElementById("latitude").value=position.coords.latitude;

            document.getElementById("longitude").value=position.coords.longitude;

            btn.innerHTML="✓ Location Received";

        },

        function(){

            btn.disabled=false;

            btn.innerHTML="Retrieve Current Location";

            alert("Unable to retrieve your location.");

        }

    );

}

function toggleDeliveryFee(){

    const value=document.getElementById("deliveryType").value;

    if(value=="Chargeable"){

        document.getElementById("deliveryFeeRow").style.display="block";

    }
    else{

        document.getElementById("deliveryFeeRow").style.display="none";

        document.getElementById("deliveryFee").value="0";

    }

}

async function submitForm(){

    const result=document.getElementById("result");

    result.innerHTML="";
    result.className="";

    const businessName=document.getElementById("businessName").value.trim();

    const latitude=document.getElementById("latitude").value;

    const longitude=document.getElementById("longitude").value;

    const category=document.getElementById("category").value;

    const deliveryType=document.getElementById("deliveryType").value;

    const deliveryFee=document.getElementById("deliveryFee").value;

    const email=document.getElementById("email").value.trim();

    const whatsapp=document.getElementById("whatsapp").value.trim();

    if(businessName==""){

        alert("Enter Business Name");

        return;

    }

    if(latitude==""){

        alert("Please retrieve your location.");

        return;

    }

    if(category==""){

        alert("Select a category.");

        return;

    }

    if(email==""){

        alert("Enter Email");

        return;

    }

    if(whatsapp==""){

        alert("Enter WhatsApp Number");

        return;

    }

    try{

        const response=await fetch("/register",{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({

                businessName,

                latitude,

                longitude,

                category,

                deliveryType,

                deliveryFee,

                email,

                whatsapp

            })

        });

        const data=await response.json();

        if(response.ok){

            result.className="success";

            result.innerHTML=data.message;

        }
        else{

            result.className="error";

            result.innerHTML=data.message;

        }

    }
    catch(error){

        result.className="error";

        result.innerHTML="Database Error";

    }

}

toggleDeliveryFee();

</script>

</body>
</html>
