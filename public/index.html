<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Customer</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" rel="stylesheet">
<link rel="stylesheet" href="/user-profile.css">
<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
padding-top:70px;
padding-bottom:70px;
}

header{
position:fixed;
top:0;
left:0;
right:0;
height:70px;
background:#000;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 15px;
z-index:1000;
}

.logo{
height:45px;
width:45px;
border-radius:50%;
object-fit:cover;
}

.brand{
height:34px;
object-fit:contain;
}

#currentLocation{
color:white;
font-size:24px;
cursor:pointer;
}

.theme{
padding:18px;
text-align:center;
font-size:18px;
font-weight:bold;
color:#333;
}

section{
display:none;
padding:20px;
}

section.active{
display:block;
}

footer{
position:fixed;
bottom:0;
left:0;
right:0;
height:65px;
background:#000;
display:flex;
justify-content:space-around;
align-items:center;
z-index:1000;
}

footer button{
background:none;
border:none;
color:white;
font-size:22px;
cursor:pointer;
display:flex;
flex-direction:column;
align-items:center;
gap:4px;
}

footer span{
font-size:11px;
}

#popup{
position:fixed;
top:-120px;
left:50%;
transform:translateX(-50%);
background:#222;
color:white;
padding:14px 20px;
border-radius:12px;
transition:.4s;
z-index:2000;
min-width:260px;
text-align:center;
}

#popup.show{
top:90px;
}

</style>
</head>

<body>

<div id="popup"></div>

<header>

<img
class="logo"
src="https://res.cloudinary.com/gb2xbn6d/image/upload/v1784683105/logo_lo1ye5.jpg">

<img
class="brand"
src="https://res.cloudinary.com/gb2xbn6d/image/upload/v1784683105/logo-white_shadow_i6dptc.webp">

<i class="fa-solid fa-rotate-right"
id="currentLocation"></i>

</header>

<div class="theme">
Shop your nearest stores in one tap.
</div>

<section id="home" class="active">
<h2>Home</h2>
</section>

<section id="cart">
<h2>Cart</h2>
</section>

<section id="orders">
<h2>Orders</h2>
</section>

<section id="favourite">
<h2>Favourite</h2>
</section>

<section id="profile">

    <!-- LOGIN -->
    <div id="loginSection" class="profileCard">

        <h2>Login</h2>

        <div class="inputGroup">
            <label>Contact Number</label>
            <input
                type="tel"
                id="loginContact"
                placeholder="+971501234567">
        </div>

        <div class="inputGroup">
            <label>Password</label>
            <input
                type="password"
                id="loginPassword"
                placeholder="Password">
        </div>

        <button id="loginBtn">
            Login
        </button>

        <p class="errorText" id="loginError"></p>

        <div class="switchText">
            Don't have an account?
            <a href="javascript:void(0)" id="showRegister">
                Register
            </a>
        </div>

    </div>



    <!-- REGISTER -->
    <div id="registerSection" class="profileCard" style="display:none;">

        <h2>Create Account</h2>

        <div class="inputGroup">
            <label>Name</label>
            <input
                type="text"
                id="registerName"
                placeholder="Your Name">
        </div>

        <div class="inputGroup">
            <label>Contact Number</label>
            <input
                type="tel"
                id="registerContact"
                placeholder="+971501234567">
        </div>

        <div class="inputGroup">
            <label>Password</label>
            <input
                type="password"
                id="registerPassword"
                placeholder="Password">
        </div>

        <div class="inputGroup">
            <label>Confirm Password</label>
            <input
                type="password"
                id="registerConfirmPassword"
                placeholder="Confirm Password">
        </div>

        <p class="errorText" id="registerError"></p>

        <button id="registerBtn">
            Register
        </button>

        <div class="switchText">
            Already have an account?
            <a href="javascript:void(0)" id="showLogin">
                Login
            </a>
        </div>

    </div>



    <!-- CUSTOMER PROFILE -->
    <div id="customerProfile" style="display:none;">

        <!-- TOP CARD -->

        <!-- TOP CARD -->

<div class="profileCard">

    <div class="profileTop">

        <div class="profileImageContainer">

            <img
                id="profileImage"
                src=""
                alt="">

            <div id="profilePlus">
                +
            </div>

            <input
                type="file"
                id="profileImageInput"
                accept="image/*"
                hidden>

        </div>

        <div class="profileInfo">

            <div class="inputGroup">

                <label>Name</label>

                <input
                    type="text"
                    id="customerName"
                    class="editableInput"
                    readonly>

            </div>

            <div class="readonlyField">

                <label>Contact Number</label>

                <div id="customerContact">
                    +971
                </div>

            </div>

            <div class="readonlyField">

                <label>Coordinates</label>

                <div class="coordinateRow">

                    <span id="customerCoordinates">
                        Not Available
                    </span>

                    <button
                        id="refreshCoordinates"
                        class="iconButton">

                        <i class="fa-solid fa-rotate-right"></i>

                    </button>

                </div>

            </div>

        </div>

    </div>

</div>


        <!-- PERSONAL INFORMATION -->

<div class="profileCard">

    <h3>Personal Information</h3>

    <div class="inputGroup">

        <label>Email (Optional)</label>

        <input
            type="email"
            id="customerEmail"
            class="editableInput"
            placeholder="Tap to add email"
            readonly>

    </div>

</div>


        <!-- ADDRESSES -->

        <div class="profileCard">

            <div class="addressHeader">

        <h3>Addresses</h3>

        <button
            id="addAddress"
            class="iconButton">

            <i class="fa-solid fa-plus"></i>

        </button>

    </div>

            <div id="addressContainer">

                <!-- Dynamic Address Cards -->

            </div>

        </div>



        <!-- PASSWORD -->

        <div class="profileCard">

            <h3>Change Password</h3>

            <br>

            <div class="inputGroup">

                <label>Old Password</label>

                <input
                    type="password"
                    id="oldPassword">

                <small
                    id="passwordValidation">

                </small>

            </div>

            <div class="inputGroup">

                <label>New Password</label>

                <input
                    type="password"
                    id="newPassword"
                    disabled>

            </div>

            <div class="inputGroup">

                <label>Confirm Password</label>

                <input
                    type="password"
                    id="confirmNewPassword"
                    disabled>

                 <small
    id="newPasswordValidation"
    style="display:block;text-align:center;margin-top:6px;min-height:18px;"></small>

            </div>

            <button
                id="changePasswordBtn"
                disabled>

                Update Password

            </button>

        </div>



        <!-- LOGOUT -->

        <div class="profileCard">

            <button
                id="logoutBtn"
                class="logoutButton">

                Logout

            </button>

        </div>

    </div>
  
</section>

<footer>

<button onclick="showSection('orders')">
<i class="fa-solid fa-box"></i>
<span>Orders</span>
</button>

<button onclick="showSection('cart')">
<i class="fa-solid fa-cart-shopping"></i>
<span>Cart</span>
</button>

<button onclick="showSection('home')">
<i class="fa-solid fa-house"></i>
<span>Home</span>
</button>

<button onclick="showSection('favourite')">
<i class="fa-regular fa-heart"></i>
<span>Favourite</span>
</button>

<button onclick="showSection('profile')">
<i class="fa-regular fa-user"></i>
<span>Profile</span>
</button>

</footer>

<script>
let currentCoordinates = null;

const CLOUD_NAME = "gb2xbn6d";
const UPLOAD_PRESET = "business_images";
</script>

<script src="/userprofile-auth.js"></script>
<script src="/userprofile-info.js"></script>
<script src="/userprofile-address.js"></script>
<script src="/userprofile-password.js"></script>    
<script>

function showSection(id){

document.querySelectorAll("section").forEach(s=>{
s.classList.remove("active");
});

document.getElementById(id).classList.add("active");

}

function popup(text){

const p=document.getElementById("popup");

p.innerText=text;

p.classList.add("show");

setTimeout(()=>{
p.classList.remove("show");
},2500);

}

document.getElementById("currentLocation").onclick=function(){

popup("Retrieving location...");

if(!navigator.geolocation){

popup("Location not supported");

return;

}

navigator.geolocation.getCurrentPosition(

(position)=>{

const lat=position.coords.latitude;
const lng=position.coords.longitude;

localStorage.setItem("customerLocation",JSON.stringify({

latitude:lat,
longitude:lng

}));

popup("Current location updated");

},

(error)=>{

popup(error.message);

},

{

enableHighAccuracy:true

}

);

};

</script>

</body>
</html>
