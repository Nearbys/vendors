<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vendor Dashboard</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,Helvetica,sans-serif;
    background:#f3f3f3;
}

/* ================= LOGIN ================= */

.login-page{

    width:100%;
    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:20px;

}

.login-card{

    width:100%;
    max-width:400px;

    background:#fff;

    border-radius:12px;

    padding:25px;

    box-shadow:0 5px 18px rgba(0,0,0,.12);

}

.login-card h2{

    text-align:center;

    color:#009500;

    margin-bottom:25px;

}

.login-card input{

    width:100%;

    padding:13px;

    margin-bottom:15px;

    border:1px solid #ccc;

    border-radius:8px;

    font-size:16px;

}

.login-card button{

    width:100%;

    padding:13px;

    border:none;

    border-radius:8px;

    background:#009500;

    color:#fff;

    font-size:16px;

    cursor:pointer;

}

.login-card button:hover{

    background:#007d00;

}

#msg{

    margin-top:15px;

    text-align:center;

    color:red;

    font-weight:bold;

}



/* ================= DASHBOARD ================= */

#dashboard{

    width:100%;

    max-width:900px;

    margin:auto;

    background:#fff;

    min-height:100vh;

}



/* ================= COVER ================= */

.cover-section{

    position:relative;

    width:100%;

}

#cover{

    width:100%;

    height:230px;

    object-fit:cover;

    background:#d8d8d8;

    display:block;

}

.cover-edit-btn{

    position:absolute;

    right:15px;

    bottom:15px;

    width:42px;

    height:42px;

    border:none;

    border-radius:50%;

    background:#ffffffdd;

    font-size:20px;

    cursor:pointer;

}



/* ================= PROFILE ================= */

.profile-row{

    display:flex;

    align-items:flex-end;

    gap:20px;

    padding:0 20px;

    margin-top:-70px;

}

.profile-box{

    position:relative;

    flex-shrink:0;

}

#profile{

    width:150px;

    height:150px;

    border-radius:50%;

    border:5px solid white;

    background:#ddd;

    object-fit:cover;

}

.profile-edit-btn{

    position:absolute;

    right:5px;

    bottom:5px;

    width:38px;

    height:38px;

    border:none;

    border-radius:50%;

    background:white;

    cursor:pointer;

}



/* ================= BUSINESS ================= */

.business-box{

    flex:1;

    padding-bottom:20px;

}

#businessDisplay{

    display:flex;

    align-items:center;

    gap:10px;

    flex-wrap:wrap;

}

#businessName{

    color:#009500;

    font-size:34px;

    font-style:italic;

    word-break:break-word;

    margin-top: 80px;

}

#editNameBtn{

    width:40px;

    height:40px;

    border:none;

    border-radius:50%;

    cursor:pointer;

    background:#f0f0f0;

}

#businessEditor{

    display:none;

    margin-top:8px;

}

#nameInput{

    width:100%;

    padding:12px;

    border:1px solid #ccc;

    border-radius:8px;

    font-size:18px;

    margin-bottom:10px;

}

#saveName, #saveDescription, #cancelDescription,

#cancelName{

    padding:10px 20px;

    border:none;

    border-radius:8px;

    cursor:pointer;

    margin-right:10px;

}

#saveName,
#saveDescription{

    background:#009500;

    color:white;

}

#cancelName,
#cancelDescription{

    background:#999;

    color:white;

}



/* ================= DIVIDER ================= */

.divider{

    width:100%;

    height:1px;

    background:#ddd;

    margin:20px 0;

}



/* ================= PREVIEW ================= */

.preview-card{

    margin:20px;

    padding:20px;

    border-radius:12px;

    background:#fafafa;

    box-shadow:0 2px 6px rgba(0,0,0,.08);

}

.preview-card h3{

    color:#009500;

    margin-bottom:12px;

}

.preview-card ul{

    margin-left:20px;

    margin-top:10px;

}

.preview-card li{

    margin-bottom:8px;

}



/* ================= LOGOUT ================= */

.logout-area{

    padding:20px;

}

#logoutBtn{

    width:100%;

    padding:13px;

    border:none;

    border-radius:8px;

    background:#d60000;

    color:white;

    cursor:pointer;

}



/* ================= MOBILE ================= */

@media(max-width:700px){

    #cover{

        height:180px;

    }

    .profile-row{

        flex-direction:column;

        align-items:center;

        margin-top:-60px;

        gap:15px;

    }

    #profile{

        width:130px;

        height:130px;

    }

    .business-box{

        width:100%;

        text-align:center;

        padding-bottom:10px;

    }

    #businessDisplay{

        justify-content:center;

    }

    #businessName{

        margin-top: -80px;
        font-size:28px;

    }

    }
</style>
</head>
<body>

<!-- ================= LOGIN ================= -->

<div id="loginPage" class="login-page">

    <div class="login-card">

        <h2>Vendor Login</h2>

        <input
        type="email"
        id="email"
        placeholder="Email Address">

        <input
        type="password"
        id="password"
        placeholder="Password">

        <button id="loginBtn" onclick="login()">

            Login

        </button>

        <div style="text-align:center;margin-top:15px;">
    Not registered?
    <a href="/register.html"
       style="color:#009500;font-weight:bold;text-decoration:none;">
        Register Now
    </a>
        </div>

        <div id="msg"></div>

    </div>

</div>



<!-- ================= DASHBOARD ================= -->

<div id="dashboard" style="display:none;">


    <!-- Cover Section -->

    <div class="cover-section">

        <img
        id="cover"
        src=""
        alt="Cover Image">

        <button
        class="cover-edit-btn"
        onclick="document.getElementById('coverFile').click()">

            ✏️

        </button>

        <input
        type="file"
        id="coverFile"
        accept="image/*"
        hidden>

    </div>



    <!-- Profile Section -->

    <div class="profile-row">

        <div class="profile-box">

            <img
            id="profile"
            src=""
            alt="Profile Image">

            <button
            class="profile-edit-btn"
            onclick="document.getElementById('profileFile').click()">

                ✏️

            </button>

            <input
            type="file"
            id="profileFile"
            accept="image/*"
            hidden>

        </div>



        <!-- Business Name -->

        <div class="business-box">

            <div id="businessDisplay">

                <h1 id="businessName"></h1>

                <button
                id="editNameBtn"
                onclick="startEditName()">

                    ✏️

                </button>

            </div>

            <div id="businessCategory"
     style="margin-top:8px;color:#666;font-size:17px;font-weight:bold;">
            </div>

            <div id="businessEditor">

                <input
                type="text"
                id="nameInput">

                <button
                id="saveName">

                    ✔

                </button>

                <button
                id="cancelName"
                onclick="cancelEditName()">

                    ✖

                </button>

            </div>

        </div>

    </div>

  <div style="padding:0 20px 20px;">

    <!-- Display -->
    <div id="descriptionDisplay">

        <p id="descriptionText"
           style="white-space:pre-wrap;line-height:1.6;color:#555;">
        </p>

        <button
            id="editDescriptionBtn"
            onclick="startEditDescription()"
            style="margin-top:10px;width:40px;height:40px;border:none;border-radius:50%;background:#f0f0f0;cursor:pointer;">

            ✏️

        </button>

    </div>

    <!-- Editor -->
    <div id="descriptionEditor" style="display:none;">

        <textarea
            id="descriptionInput"
            rows="3"
            maxlength="300"
            style="width:100%;padding:12px;border:1px solid #ccc;border-radius:8px;font-size:16px;resize:vertical;"></textarea>

        <div style="margin-top:10px;">

            <button id="saveDescription">✔</button>

            <button
                id="cancelDescription"
                onclick="cancelEditDescription()">

                ✖

            </button>

        </div>

    </div>

</div>

    <!-- Divider -->

    <div class="divider"></div>



    <!-- Preview Area -->

    <div class="preview-card">

        <h3>Business Preview</h3>

        <p>

            This section will later contain:

        </p>

        <ul>

            <li>Category</li>

            <li>Delivery Fee</li>

            <li>Email</li>

            <li>WhatsApp</li>

            <li>Business Hours</li>

            <li>Products</li>

            <li>Gallery</li>

            <li>Offers</li>

        </ul>

    </div>



    <!-- Logout -->

    <div class="logout-area">

        <button
        id="logoutBtn">

            Logout

        </button>

    </div>

</div>

<script>

const CLOUD_NAME="gb2xbn6d";
const UPLOAD_PRESET="business_images";
const FOLDER="Businesses";

let vendor=null;



//================ LOGIN ================//

async function login(){

    const msg=document.getElementById("msg");

    msg.innerHTML="";

    const btn=document.getElementById("loginBtn");

    btn.disabled=true;

    btn.innerHTML="Signing in...";

    try{

        const response=await fetch("/vendor-login",{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({

                email:document.getElementById("email").value.trim().toLowerCase(),

                password:document.getElementById("password").value

            })

        });

        const data=await response.json();

        if(!response.ok){

            msg.style.color="red";

            msg.innerHTML=data.message;

            btn.disabled=false;

            btn.innerHTML="Login";

            return;

        }

        vendor=data.vendor;

        localStorage.setItem("vendor", JSON.stringify(vendor));

        document.getElementById("loginPage").style.display="none";

        document.getElementById("dashboard").style.display="block";

        loadVendor();

    }
    catch(err){

        console.log(err);

        msg.innerHTML="Unable to connect.";

        btn.disabled=false;

        btn.innerHTML="Login";

    }

}



//================ LOAD DATA ================//

function loadVendor(){

    document.getElementById("businessName").innerHTML=

        vendor.business_name;

    document.getElementById("nameInput").value=

        vendor.business_name;
    
    document.getElementById("businessCategory").textContent =
    
        vendor.category;

   document.getElementById("descriptionText").textContent =
    
       vendor.description || "Add description about your Business..";

document.getElementById("descriptionInput").value =
    
        vendor.description || "";

    document.getElementById("cover").src=

        vendor.cover_image ||

        "https://placehold.co/1200x350?text=Cover+Image";

    document.getElementById("profile").src=

        vendor.profile_image ||

        "https://placehold.co/250x250?text=Profile";

}



//================ LOGOUT ================//

document.getElementById("logoutBtn").onclick=function(){

    localStorage.removeItem("vendor");

    vendor=null;

    document.getElementById("dashboard").style.display="none";

    document.getElementById("loginPage").style.display="flex";

    document.getElementById("password").value="";

};







//================ CLOUDINARY UPLOAD ================//

async function uploadToCloudinary(file){

    const formData = new FormData();

    formData.append("file", file);

    formData.append("upload_preset", UPLOAD_PRESET);

    formData.append("folder", FOLDER);

    const response = await fetch(

        `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`,

        {

            method: "POST",

            body: formData

        }

    );

    const data = await response.json();

    if(!response.ok){

        throw new Error(data.error?.message || "Cloudinary upload failed.");

    }

    return data.secure_url;

}



//================ IMAGE PREVIEW ================//

function previewImage(input,imageId){

    if(!input.files.length) return;

    const reader=new FileReader();

    reader.onload=function(e){

        document.getElementById(imageId).src=e.target.result;

    };

    reader.readAsDataURL(input.files[0]);

}



//================ COVER IMAGE ================//

document.getElementById("coverFile").addEventListener(

"change",

async function(){

    if(!this.files.length) return;

    previewImage(this,"cover");

    try{

        const imageUrl=

        await uploadToCloudinary(this.files[0]);

        const response=await fetch("/update-cover",{

            method:"POST",

            headers:{

                "Content-Type":"application/json"

            },

            body:JSON.stringify({

                email:vendor.email,

                coverImage:imageUrl

            })

        });

        const data=await response.json();

        if(!response.ok){

            alert(data.message);

            loadVendor();

            return;

        }

        vendor.cover_image=imageUrl;

        localStorage.setItem(
    "vendor",
    JSON.stringify(vendor)
);

    }
    catch(err){

        console.log(err);

        alert("Unable to update cover image.");

        loadVendor();

    }

});



//================ PROFILE IMAGE ================//

document.getElementById("profileFile").addEventListener(

"change",

async function(){

    if(!this.files.length) return;

    previewImage(this,"profile");

    try{

        const imageUrl=

        await uploadToCloudinary(this.files[0]);

        const response=await fetch("/update-profile",{

            method:"POST",

            headers:{

                "Content-Type":"application/json"

            },

            body:JSON.stringify({

                email:vendor.email,

                profileImage:imageUrl

            })

        });

        const data=await response.json();

        if(!response.ok){

            alert(data.message);

            loadVendor();

            return;

        }

        vendor.profile_image=imageUrl;

        localStorage.setItem(
    "vendor",
    JSON.stringify(vendor)
);

    }
    catch(err){

        console.log(err);

        alert("Unable to update profile image.");

        loadVendor();

    }

});








//================ BUSINESS NAME ================//

function startEditName(){

    document.getElementById("businessDisplay").style.display="none";

    document.getElementById("businessEditor").style.display="block";

    document.getElementById("nameInput").focus();

}



function cancelEditName(){

    document.getElementById("businessEditor").style.display="none";

    document.getElementById("businessDisplay").style.display="flex";

    document.getElementById("nameInput").value=

        vendor.business_name;

}



document.getElementById("saveName").onclick=async function(){

    const newName=

    document.getElementById("nameInput").value.trim();

    if(newName===""){

        alert("Business name cannot be empty.");

        return;

    }

    const btn=this;

    btn.disabled=true;

    btn.innerHTML="Saving...";

    try{

        const response=await fetch("/update-business-name",{

            method:"POST",

            headers:{

                "Content-Type":"application/json"

            },

            body:JSON.stringify({

                email:vendor.email,

                businessName:newName

            })

        });

        const data=await response.json();

        if(!response.ok){

            alert(data.message);

            btn.disabled=false;

            btn.innerHTML="✔";

            return;

        }

        vendor.business_name=newName;

        localStorage.setItem(
    "vendor",
    JSON.stringify(vendor)
);

        document.getElementById("businessName").innerHTML=newName;

        cancelEditName();

    }
    catch(err){

        console.log(err);

        alert("Unable to update business name.");

    }

    btn.disabled=false;

    btn.innerHTML="✔";

};

//============== UPDATE DESCRIPTION ==============//

function startEditDescription(){

    document.getElementById("descriptionDisplay").style.display="none";

    document.getElementById("descriptionEditor").style.display="block";

    document.getElementById("descriptionInput").focus();

}

function cancelEditDescription(){

    document.getElementById("descriptionEditor").style.display="none";

    document.getElementById("descriptionDisplay").style.display="block";

    document.getElementById("descriptionInput").value=
        vendor.description || "";

}
    
document.getElementById("saveDescription").onclick=async function(){

    const description=
        document.getElementById("descriptionInput").value.trim();

    const btn=this;

    btn.disabled=true;
    btn.innerHTML="Saving...";

    try{

        const response=await fetch("/update-description",{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({

                email:vendor.email,

                description

            })

        });

        const data=await response.json();

        if(!response.ok){

            alert(data.message);

            btn.disabled=false;

            btn.innerHTML="✔";

            return;

        }

        vendor.description=description;

        localStorage.setItem(
            "vendor",
            JSON.stringify(vendor)
        );

        document.getElementById("descriptionText").textContent=
            description || "No business description added yet.";

        cancelEditDescription();

    }
    catch(err){

        console.log(err);

        alert("Unable to update business description.");

    }

    btn.disabled=false;

    btn.innerHTML="✔";

    };
    
//============== ENTER KEY SUPPORT ==============//

document.getElementById("password").addEventListener(

"keypress",

function(e){

    if(e.key==="Enter"){

        login();

    }

}

);



document.getElementById("nameInput").addEventListener(

"keypress",

function(e){

    if(e.key==="Enter"){

        document.getElementById("saveName").click();

    }

}

);

window.onload=function(){

    const savedVendor=

    localStorage.getItem("vendor");

    if(savedVendor){

        vendor=JSON.parse(savedVendor);

        document.getElementById("loginPage").style.display="none";

        document.getElementById("dashboard").style.display="block";

        loadVendor();

    }

};    

</script>    
    
    
</body>
</html>
