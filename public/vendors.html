<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vendor Dashboard</title>
<style>
body{margin:0;font-family:Arial;background:#f4f4f4}
#login{max-width:360px;margin:40px auto;background:#fff;padding:20px;border-radius:10px;box-shadow:0 2px 8px #0002}
input{width:100%;padding:12px;margin:10px 0;box-sizing:border-box}
button{padding:12px 18px;background:#009500;color:#fff;border:none;border-radius:6px;cursor:pointer}
#dashboard{display:none}
.coverWrap{position:relative}
#cover{width:100%;height:220px;object-fit:cover;background:#cfe}
.coverEdit{position:absolute;right:15px;bottom:15px}
.profileWrap{position:relative;width:150px;margin-left:20%;margin-top:-75px}
#profile{width:150px;height:150px;border-radius:50%;border:5px solid #fff;object-fit:cover;background:#ddd}
.profileEdit{position:absolute;right:0;bottom:0}
.header{display:flex;align-items:center;padding:0 20px 20px}
.nameArea{margin-left:30px;display:flex;align-items:center;gap:10px;font-size:34px;font-weight:bold;color:#0a8f0a;font-style:italic}
#nameInput{display:none;font-size:26px;padding:6px}
#saveName{display:none}
</style>
</head>
<body>
<div id="login">
<h2>Vendor Login</h2>
<input id="email" type="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<div id="msg"></div>
</div>

<div id="dashboard">
<div class="coverWrap">
<img id="cover">
<button class="coverEdit" onclick="document.getElementById('coverFile').click()">✏️</button>
<input type="file" id="coverFile" hidden accept="image/*">
</div>

<div class="header">
<div class="profileWrap">
<img id="profile">
<button class="profileEdit" onclick="document.getElementById('profileFile').click()">✏️</button>
<input type="file" id="profileFile" hidden accept="image/*">
</div>

<div class="nameArea">
<span id="businessName"></span>
<button id="editName" onclick="editName()">✏️</button>
<input id="nameInput">
<button id="saveName">✔</button>
</div>
</div>
</div>

<script>

let vendor = null;

async function login(){

    const msg = document.getElementById("msg");

    msg.innerHTML = "";

    try{

        const email = document.getElementById("email").value.trim().toLowerCase();

        const password = document.getElementById("password").value;

        const r = await fetch("/vendor-login",{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({

                email,
                password

            })

        });

        const data = await r.json();

        if(!r.ok){

            msg.style.color="red";
            msg.innerHTML=data.message;
            return;

        }

        vendor=data.vendor;

        document.getElementById("login").style.display="none";

        document.getElementById("dashboard").style.display="block";

        document.getElementById("cover").src=vendor.cover_image || "";

        document.getElementById("profile").src=vendor.profile_image || "";

        document.getElementById("businessName").innerHTML=vendor.business_name;

    }
    catch(err){

        console.log(err);

        msg.style.color="red";

        msg.innerHTML="Unable to connect to server.";

    }

}



function startEditName(){

    document.getElementById("businessName").style.display="none";

    document.getElementById("editNameBtn").style.display="none";

    document.getElementById("nameInput").style.display="inline-block";

    document.getElementById("saveName").style.display="inline-block";

    document.getElementById("nameInput").value=

    document.getElementById("businessName").innerHTML;

}



document.getElementById("saveName").onclick=async function(){

    const newName=document.getElementById("nameInput").value.trim();

    if(newName===""){

        alert("Business name cannot be empty.");

        return;

    }

    try{

        const r=await fetch("/update-business-name",{

            method:"POST",

            headers:{

                "Content-Type":"application/json"

            },

            body:JSON.stringify({

                email:vendor.email,

                businessName:newName

            })

        });

        const data=await r.json();

        if(!r.ok){

            alert(data.message);

            return;

        }

        document.getElementById("businessName").innerHTML=newName;

        vendor.business_name=newName;

        document.getElementById("businessName").style.display="inline";

        document.getElementById("editNameBtn").style.display="inline-block";

        document.getElementById("nameInput").style.display="none";

        document.getElementById("saveName").style.display="none";

    }
    catch(err){

        console.log(err);

        alert("Unable to update business name.");

    }

};


// Cover and Profile upload will be added next.

</script></body>
</html>
