<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vendor Dashboard</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,Helvetica,sans-serif;
    background:#f3f3f3;
}

/* ================= LOGIN ================= */

.login-page{

    width:100%;
    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:20px;

}

.login-card{

    width:100%;
    max-width:400px;

    background:#fff;

    border-radius:12px;

    padding:25px;

    box-shadow:0 5px 18px rgba(0,0,0,.12);

}

.login-card h2{

    text-align:center;

    color:#009500;

    margin-bottom:25px;

}

.login-card input{

    width:100%;

    padding:13px;

    margin-bottom:15px;

    border:1px solid #ccc;

    border-radius:8px;

    font-size:16px;

}

.login-card button{

    width:100%;

    padding:13px;

    border:none;

    border-radius:8px;

    background:#009500;

    color:#fff;

    font-size:16px;

    cursor:pointer;

}

.login-card button:hover{

    background:#007d00;

}

#msg{

    margin-top:15px;

    text-align:center;

    color:red;

    font-weight:bold;

}



/* ================= DASHBOARD ================= */

#dashboard{

    width:100%;

    max-width:900px;

    margin:auto;

    background:#fff;

    min-height:100vh;

}



/* ================= COVER ================= */

.cover-section{

    position:relative;

    width:100%;

}

#cover{

    width:100%;

    height:230px;

    object-fit:cover;

    background:#d8d8d8;

    display:block;

}

.cover-edit-btn{

    position:absolute;

    right:15px;

    bottom:15px;

    width:42px;

    height:42px;

    border:none;

    border-radius:50%;

    background:#ffffffdd;

    font-size:20px;

    cursor:pointer;

}



/* ================= PROFILE ================= */

.profile-row{

    display:flex;

    align-items:flex-end;

    gap:20px;

    padding:0 20px;

    margin-top:-70px;

}

.profile-box{

    position:relative;

    flex-shrink:0;

}

#profile{

    width:150px;

    height:150px;

    border-radius:50%;

    border:5px solid white;

    background:#ddd;

    object-fit:cover;

}

.profile-edit-btn{

    position:absolute;

    right:5px;

    bottom:5px;

    width:38px;

    height:38px;

    border:none;

    border-radius:50%;

    background:white;

    cursor:pointer;

}



/* ================= BUSINESS ================= */

.business-box{

    flex:1;

    padding-bottom:20px;

}

#businessDisplay{

    display:flex;

    align-items:center;

    gap:10px;

    flex-wrap:wrap;

}

#businessName{

    color:#009500;

    font-size:34px;

    font-style:italic;

    word-break:break-word;

    margin-top: 80px;

}

#editNameBtn{

    width:40px;

    height:40px;

    border:none;

    border-radius:50%;

    cursor:pointer;

    background:#f0f0f0;

    margin-top: 80px;

}

#businessEditor{

    display:none;

    margin-top:8px;

}

#nameInput{

    width:100%;

    padding:12px;

    border:1px solid #ccc;

    border-radius:8px;

    font-size:18px;

    margin-bottom:10px;

}

#saveName, #saveDescription, #cancelDescription, #saveAddress, #cancelAddress,

#cancelName{

    padding:10px 20px;

    border:none;

    border-radius:8px;

    cursor:pointer;

    margin-right:10px;

}

#saveName, #saveAddress,
#saveDescription{

    background:#009500;

    color:white;

}

#cancelName, #cancelAddress,
#cancelDescription{

    background:#999;

    color:white;

}



/* ================= DIVIDER ================= */

.divider{

    width:100%;

    height:1px;

    background:#ddd;

    margin:20px 0;

}



/* ================= PREVIEW ================= */

.preview-card{

    margin:20px;

    padding:20px;

    border-radius:12px;

    background:#fafafa;

    box-shadow:0 2px 6px rgba(0,0,0,.08);

}

.preview-card h3{

    color:#009500;

    margin-bottom:12px;

}

.preview-card ul{

    margin-left:20px;

    margin-top:10px;

}

.preview-card li{

    margin-bottom:8px;

}



/* ================= LOGOUT ================= */

.logout-area{

    padding:20px;

}

#logoutBtn{

    width:100%;

    padding:13px;

    border:none;

    border-radius:8px;

    background:#d60000;

    color:white;

    cursor:pointer;

}

    /* ================= BUSINESS INFO ================= */

.business-info{

    display:flex;

    gap:40px;

    padding:0 20px 20px;

    align-items:flex-start;

}

.info-address{

    flex:1;

}

.info-address h3{

    margin-bottom:10px;

    color:#444;

    font-size:18px;

}

#addressText{

    white-space:pre-wrap;

    line-height:1.6;

    color:#555;

    min-height:75px;

}

#editAddressBtn{

    margin-top:10px;

    width:40px;

    height:40px;

    border:none;

    border-radius:50%;

    background:#f0f0f0;

    cursor:pointer;

}

#addressInput{

    width:100%;

    padding:12px;

    border:1px solid #ccc;

    border-radius:8px;

    font-size:16px;

    resize:vertical;

}

.address-buttons{

    margin-top:10px;

}

.info-contact{

    width:280px;

    padding-top:30px;

}

.info-contact p{

    font-size:18px;

    margin-bottom:15px;

    color:#444;

    line-height:1.5;

}

.info-contact strong{

    color:#222;

}

    .delivery-section{

    padding:0 20px 20px;

}

.delivery-section label{

    display:block;

    margin-bottom:8px;

    font-weight:bold;

    color:#444;

}

#deliverySelect{

    width:100%;

    max-width:350px;

    padding:12px;

    border:1px solid #ccc;

    border-radius:8px;

    font-size:16px;

    background:white;

}

    /* ================= CHARGEABLE ================= */

.chargeable-section{

    padding:0 20px 20px;

    display:flex;

    align-items:center;

    gap:15px;

}

.switch{

    position:relative;

    display:inline-block;

    width:58px;

    height:32px;

}

.switch input{

    opacity:0;

    width:0;

    height:0;

}

.slider{

    position:absolute;

    cursor:pointer;

    top:0;

    left:0;

    right:0;

    bottom:0;

    background:#ccc;

    transition:.3s;

    border-radius:32px;

}

.slider:before{

    position:absolute;

    content:"";

    height:24px;

    width:24px;

    left:4px;

    bottom:4px;

    background:white;

    transition:.3s;

    border-radius:50%;

}

.switch input:checked + .slider{

    background:#009500;

}

.switch input:checked + .slider:before{

    transform:translateX(26px);

}

#chargeableLabel{

    font-size:17px;

    font-weight:bold;

    color:#444;

}

/* ================= CURRENCY ================= */

.currency-section{

    padding:0 20px 20px;

}

.currency-section label{

    display:block;

    margin-bottom:8px;

    font-weight:bold;

    color:#444;

}

#currencySelect{

    width:100%;

    max-width:350px;

    padding:12px;

    border:1px solid #ccc;

    border-radius:8px;

    font-size:16px;

    background:white;

    cursor:pointer;

}

#currencySelect:focus{

    outline:none;

    border-color:#009500;

}

/* ================= FEE ================= */

.fee-section{

    padding:0 20px 20px;

}

.fee-section label{

    display:block;

    margin-bottom:8px;

    font-weight:bold;

    color:#444;

}

#deliveryFee{

    width:100%;

    max-width:350px;

    padding:12px;

    border:1px solid #ccc;

    border-radius:8px;

    font-size:16px;

}

#deliveryFee:focus{

    outline:none;

    border-color:#009500;

}

/* ================= PAGES ================= */

.page-section{

    display:none;

    min-height:calc(100vh - 70px);

    padding:30px 20px 100px;

    background:#fff;

}

#profileSection{

    display:block;

    padding-bottom:90px;

}

/* ================= FOOTER ================= */

.vendor-footer{

    position:fixed;

    left:0;

    right:0;

    bottom:0;

    height:70px;

    background:#fff;

    border-top:1px solid #ddd;

    display:flex;

    z-index:9999;

    box-shadow:0 -2px 10px rgba(0,0,0,.08);

}

.footer-btn{

    flex:1;

    border:none;

    background:white;

    cursor:pointer;

    display:flex;

    flex-direction:column;

    justify-content:center;

    align-items:center;

    gap:4px;

    font-size:24px;

    color:#777;

}

.footer-btn span{

    font-size:13px;

    font-weight:bold;

}

.footer-btn.active{

    color:#009500;

}

.footer-btn:hover{

    background:#f7f7f7;

}

    
/* ================= MOBILE ================= */

@media(max-width:700px){

    #cover{

        height:180px;

    }

    .profile-row{

        flex-direction:column;

        align-items:center;

        margin-top:-60px;

        gap:15px;

    }

    #profile{

        width:130px;

        height:130px;

    }

    .business-box{

        width:100%;

        text-align:center;

        padding-bottom:10px;

    }

    #businessDisplay{

        justify-content:center;

    }

    #businessName{

        margin-top: -10px;
        font-size:28px;

    }

    #editNameBtn{

        margin-top: -10px;

    }

    .business-info{

    flex-direction:column;

    gap:20px;

    }

    .info-contact{

    width:100%;

    padding-top:0;

    }

    .vendor-footer{

        height:65px;

    }

    .footer-btn{

        font-size:22px;

    }

    .footer-btn span{

        font-size:12px;

    }
}

</style>
</head>
<body>

<!-- ================= LOGIN ================= -->

<div id="loginPage" class="login-page">

    <div class="login-card">

        <h2>Vendor Login</h2>

        <input
        type="email"
        id="email"
        placeholder="Email Address">

        <input
        type="password"
        id="password"
        placeholder="Password">

        <button id="loginBtn" onclick="login()">

            Login

        </button>

        <div style="text-align:center;margin-top:15px;">
    Not registered?
    <a href="/register.html"
       style="color:#009500;font-weight:bold;text-decoration:none;">
        Register Now
    </a>
        </div>

        <div id="msg"></div>

    </div>

</div>



<!-- ================= DASHBOARD ================= -->

<div id="dashboard" style="display:none;">
    <div id="profileSection">


    <!-- Cover Section -->

    <div class="cover-section">

        <img
        id="cover"
        src=""
        alt="Cover Image">

        <button
        class="cover-edit-btn"
        onclick="document.getElementById('coverFile').click()">

            ✏️

        </button>

        <input
        type="file"
        id="coverFile"
        accept="image/*"
        hidden>

    </div>



    <!-- Profile Section -->

    <div class="profile-row">

        <div class="profile-box">

            <img
            id="profile"
            src=""
            alt="Profile Image">

            <button
            class="profile-edit-btn"
            onclick="document.getElementById('profileFile').click()">

                ✏️

            </button>

            <input
            type="file"
            id="profileFile"
            accept="image/*"
            hidden>

        </div>



        <!-- Business Name -->

        <div class="business-box">

            <div id="businessDisplay">

                <h1 id="businessName"></h1>

                <button
                id="editNameBtn"
                onclick="startEditName()">

                    ✏️

                </button>

            </div>

            <div id="businessCategory"
     style="margin-top:8px;color:#666;font-size:17px;font-weight:bold;">
            </div>

            <div id="businessEditor">

                <input
                type="text"
                id="nameInput">

                <button
                id="saveName">

                    ✔

                </button>

                <button
                id="cancelName"
                onclick="cancelEditName()">

                    ✖

                </button>

            </div>

        </div>

    </div>

  <div style="padding:0 20px 20px;">

    <!-- Display -->
    <div id="descriptionDisplay">

        <p id="descriptionText"
           style="white-space:pre-wrap;line-height:1.6;color:#555;">
        </p>

        <button
            id="editDescriptionBtn"
            onclick="startEditDescription()"
            style="margin-top:10px;width:40px;height:40px;border:none;border-radius:50%;background:#f0f0f0;cursor:pointer;">

            ✏️

        </button>

    </div>

    <!-- Editor -->
    <div id="descriptionEditor" style="display:none;">

        <textarea
            id="descriptionInput"
            rows="3"
            maxlength="300"
            style="width:100%;padding:12px;border:1px solid #ccc;border-radius:8px;font-size:16px;resize:vertical;"></textarea>

        <div style="margin-top:10px;">

            <button id="saveDescription">✔</button>

            <button
                id="cancelDescription"
                onclick="cancelEditDescription()">

                ✖

            </button>

        </div>

    </div>

</div>

    <!-- ================= BUSINESS INFO ================= -->

<div class="business-info">

    <!-- Address -->

    <div class="info-address">

        <h3>Address</h3>

        <div id="addressDisplay">

            <p id="addressText"></p>

            <button
                id="editAddressBtn"
                onclick="startEditAddress()">

                ✏️

            </button>

        </div>

        <div id="addressEditor" style="display:none;">

            <textarea
                id="addressInput"
                rows="3"
                maxlength="250"
                placeholder="Enter your business address...">
            </textarea>

            <div class="address-buttons">

                <button id="saveAddress">✔</button>

                <button
                    id="cancelAddress"
                    onclick="cancelEditAddress()">

                    ✖

                </button>

            </div>

        </div>

    </div>

    <!-- Contact Details -->

    <div class="info-contact">

        <p>
            <strong>Email :</strong>
            <span id="emailText"></span>
        </p>

        <p>
            <strong>Contact :</strong>
            <span id="contactText"></span>
        </p>

    </div>

</div>

    <div class="delivery-section">

    <label for="deliverySelect"><strong>Delivery</strong></label>

    <select id="deliverySelect">

        <option value="N/A">N/A</option>

        <option value="Not Delivering">Not Delivering</option>

        <option value="Within 100 m">Within 100 m</option>

        <option value="Within 200 m">Within 200 m</option>

        <option value="Within 500 m">Within 500 m</option>

        <option value="Within 1 km">Within 1 km</option>

        <option value="Within 10 km">Within 10 km</option>

        <option value="Nationwide">Nationwide</option>

        <option value="Nationwide & International">
            Nationwide & International
        </option>

    </select>

    </div>



    <!-- ================= CHARGEABLE ================= -->

<div class="chargeable-section">

    <label class="switch">

        <input
            type="checkbox"
            id="chargeableToggle">

        <span class="slider"></span>

    </label>

    <span id="chargeableLabel">
        Free Delivery
    </span>

</div>

    <div class="currency-section">

    <label for="currencySelect">
        <strong>Currency</strong>
    </label>

    <select id="currencySelect">

        <option value="AED">AED - UAE Dirham</option>

        <option value="SAR">SAR - Saudi Riyal</option>

        <option value="OMR">OMR - Omani Rial</option>

        <option value="USD">USD - US Dollar</option>

    </select>

</div>

    <div class="fee-section">

    <label for="deliveryFee">
        <strong>Fee</strong>
    </label>

    <input
        type="number"
        id="deliveryFee"
        placeholder="0.00"
        min="0.00"
        step="0.01"
        inputmode="decimal">
</div>
    
    <!-- Divider -->

    <!-- Logout -->

    <div class="logout-area">

        <button
        id="logoutBtn">

            Logout

        </button>

    </div>
    
    <!-- ================= Orders Section  ================= -->

    <div id="ordersSection" class="page-section">

    <h2>Orders</h2>

</div>
 
    
    <!-- ================= Products Section ================= -->

<div id="productsSection" class="page-section">

    <h2>Products</h2>

</div>    
     <!-- ================= Footer ================= -->

<footer class="vendor-footer">

    <button
        id="ordersTab"
        class="footer-btn"
        onclick="showOrders()">

        📦
        <span>Orders</span>

    </button>

    <button
        id="productsTab"
        class="footer-btn"
        onclick="showProducts()">

        🛒
        <span>Products</span>

    </button>

    <button
        id="profileTab"
        class="footer-btn active"
        onclick="showProfile()">

        👤
        <span>Profile</span>

    </button>

</footer>

//================ Footer End ================//
    
</div>

<script>

const CLOUD_NAME="gb2xbn6d";
const UPLOAD_PRESET="business_images";
const FOLDER="Businesses";

let vendor=null;


function clearFooter(){

    document.querySelectorAll(".footer-btn").forEach(btn=>{

        btn.classList.remove("active");

    });

}

function showProfile(){

    document.getElementById("profileSection").style.display="block";

    document.getElementById("ordersSection").style.display="none";

    document.getElementById("productsSection").style.display="none";

    clearFooter();

    document.getElementById("profileTab").classList.add("active");

}

function showOrders(){

    document.getElementById("profileSection").style.display="none";

    document.getElementById("ordersSection").style.display="block";

    document.getElementById("productsSection").style.display="none";

    clearFooter();

    document.getElementById("ordersTab").classList.add("active");

}

function showProducts(){

    document.getElementById("profileSection").style.display="none";

    document.getElementById("ordersSection").style.display="none";

    document.getElementById("productsSection").style.display="block";

    clearFooter();

    document.getElementById("productsTab").classList.add("active");

}
    

//================ LOGIN ================//

async function login(){

    const msg=document.getElementById("msg");

    msg.innerHTML="";

    const btn=document.getElementById("loginBtn");

    btn.disabled=true;

    btn.innerHTML="Signing in...";

    try{

        const response=await fetch("/vendor-login",{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({

                email:document.getElementById("email").value.trim().toLowerCase(),

                password:document.getElementById("password").value

            })

        });

        const data=await response.json();

        if(!response.ok){

            msg.style.color="red";

            msg.innerHTML=data.message;

            btn.disabled=false;

            btn.innerHTML="Login";

            return;

        }

        vendor=data.vendor;

        localStorage.setItem("vendor", JSON.stringify(vendor));

        document.getElementById("loginPage").style.display="none";

        document.getElementById("dashboard").style.display="block";

        loadVendor();

    }
    catch(err){

        console.log(err);

        msg.innerHTML="Unable to connect.";

        btn.disabled=false;

        btn.innerHTML="Login";

    }

}



//================ LOAD DATA ================//

function loadVendor(){

    document.getElementById("businessName").innerHTML=

        vendor.business_name;

    document.getElementById("nameInput").value=

        vendor.business_name;
    
    document.getElementById("businessCategory").textContent =
    
        vendor.category;

   document.getElementById("descriptionText").textContent =
    
       vendor.description || "Add description about your Business..";

    document.getElementById("descriptionInput").value =
    
        vendor.description || "";

   document.getElementById("addressText").textContent =
    
       vendor.address || "No address added yet.";

   document.getElementById("addressInput").value =
    
       vendor.address || "";     

    document.getElementById("emailText").textContent =
    
        vendor.email || "";

    document.getElementById("contactText").textContent =
    
        vendor.whatsapp || "";

    document.getElementById("deliverySelect").value =
    
        vendor.delivery || "N/A";

    document.getElementById("currencySelect").value =
   
        vendor.currency || "AED";

    document.getElementById("deliveryFee").value =
    
        vendor.fee || "0.00";
    
    document.getElementById("cover").src=

        vendor.cover_image ||

        "https://placehold.co/1200x350?text=Cover+Image";

    document.getElementById("profile").src=

        vendor.profile_image ||

        "https://placehold.co/250x250?text=Profile";

}



//================ LOGOUT ================//

document.getElementById("logoutBtn").onclick=function(){

    localStorage.removeItem("vendor");

    vendor=null;

    document.getElementById("dashboard").style.display="none";

    document.getElementById("loginPage").style.display="flex";

    document.getElementById("password").value="";

};







//================ CLOUDINARY UPLOAD ================//

async function uploadToCloudinary(file){

    const formData = new FormData();

    formData.append("file", file);

    formData.append("upload_preset", UPLOAD_PRESET);

    formData.append("folder", FOLDER);

    const response = await fetch(

        `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`,

        {

            method: "POST",

            body: formData

        }

    );

    const data = await response.json();

    if(!response.ok){

        throw new Error(data.error?.message || "Cloudinary upload failed.");

    }

    return data.secure_url;

}



//================ IMAGE PREVIEW ================//

function previewImage(input,imageId){

    if(!input.files.length) return;

    const reader=new FileReader();

    reader.onload=function(e){

        document.getElementById(imageId).src=e.target.result;

    };

    reader.readAsDataURL(input.files[0]);

}



//================ COVER IMAGE ================//

document.getElementById("coverFile").addEventListener(

"change",

async function(){

    if(!this.files.length) return;

    previewImage(this,"cover");

    try{

        const imageUrl=

        await uploadToCloudinary(this.files[0]);

        const response=await fetch("/update-cover",{

            method:"POST",

            headers:{

                "Content-Type":"application/json"

            },

            body:JSON.stringify({

                email:vendor.email,

                coverImage:imageUrl

            })

        });

        const data=await response.json();

        if(!response.ok){

            alert(data.message);

            loadVendor();

            return;

        }

        vendor.cover_image=imageUrl;

        localStorage.setItem(
    "vendor",
    JSON.stringify(vendor)
);

    }
    catch(err){

        console.log(err);

        alert("Unable to update cover image.");

        loadVendor();

    }

});



//================ PROFILE IMAGE ================//

document.getElementById("profileFile").addEventListener(

"change",

async function(){

    if(!this.files.length) return;

    previewImage(this,"profile");

    try{

        const imageUrl=

        await uploadToCloudinary(this.files[0]);

        const response=await fetch("/update-profile",{

            method:"POST",

            headers:{

                "Content-Type":"application/json"

            },

            body:JSON.stringify({

                email:vendor.email,

                profileImage:imageUrl

            })

        });

        const data=await response.json();

        if(!response.ok){

            alert(data.message);

            loadVendor();

            return;

        }

        vendor.profile_image=imageUrl;

        localStorage.setItem(
    "vendor",
    JSON.stringify(vendor)
);

    }

//============== UPDATE DELIVERY FEE ==============//    

const feeInput = document.getElementById("deliveryFee");

feeInput.addEventListener("blur", async function(){

    let fee = parseFloat(this.value);

    if(isNaN(fee) || fee < 0){

        fee = 0;

    }

    fee = fee.toFixed(2);

    this.value = fee;

    try{

        const response = await fetch("/update-fee",{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({

                email:vendor.email,

                fee

            })

        });

        const data = await response.json();

        if(!response.ok){

            alert(data.message);

            this.value = vendor.fee || "0.00";

            return;

        }

        vendor.fee = fee;

        localStorage.setItem(

            "vendor",

            JSON.stringify(vendor)

        );

    }

    catch(err){

        console.log(err);

        alert("Unable to update fee.");

        this.value = vendor.fee || "0.00";

    }

});
