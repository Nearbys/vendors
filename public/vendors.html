//================ PRODUCT MODAL ================//    

const productMessage = document.getElementById("productMessage");

function showProductMessage(message, type) {

    if (!productMessage) return;

    productMessage.textContent = message;
    productMessage.className = `product-message ${type}`;

    clearTimeout(showProductMessage.timer);

    showProductMessage.timer = setTimeout(() => {
        productMessage.textContent = "";
        productMessage.className = "product-message";
    }, 3000);

}
    

const style = document.getElementById("productsStyle");

if (style && style.disabled) {

    style.href = "/add-products.css";
    style.disabled = false;

}

//================ --- ================//

const productModal = document.getElementById("productModal");

const addProductBtn = document.getElementById("addProductBtn");

const closeProductModal = document.getElementById("closeProductModal");

addProductBtn.addEventListener("click", () => {

    productModal.style.display = "flex";

});

closeProductModal.addEventListener("click", () => {

    productModal.style.display = "none";

});

productModal.addEventListener("click", (e) => {

    if(e.target === productModal){

        productModal.style.display = "none";

    }

});

const UPLOAD_PRESET="business_images";
const FOLDER="Businesses";

let vendor=null;


function clearFooter(){

    document.querySelectorAll(".footer-btn").forEach(btn=>{

        btn.classList.remove("active");

    });

}

function showProfile(){

    document.getElementById("profileSection").style.display="block";

    document.getElementById("ordersSection").style.display="none";

    document.getElementById("productsSection").style.display="none";

    clearFooter();

    document.getElementById("profileTab").classList.add("active");

}

function showOrders(){

    document.getElementById("profileSection").style.display="none";

    document.getElementById("ordersSection").style.display="block";

    document.getElementById("productsSection").style.display="none";

    clearFooter();

    document.getElementById("ordersTab").classList.add("active");

//================ LOGIN ================//

async function login(){

    const msg=document.getElementById("msg");

    msg.innerHTML="";

    const btn=document.getElementById("loginBtn");

    btn.disabled=true;

    btn.innerHTML="Signing in...";

    try{

        const response=await fetch("/vendor-login",{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({

                email:document.getElementById("email").value.trim().toLowerCase(),

                password:document.getElementById("password").value

            })

        });

        const data=await response.json();

        if(!response.ok){

            msg.style.color="red";

            msg.innerHTML=data.message;

            btn.disabled=false;

            btn.innerHTML="Login";

            return;

        }

        vendor=data.vendor;

        localStorage.setItem("vendor", JSON.stringify(vendor));

        document.getElementById("loginPage").style.display="none";

        document.getElementById("dashboard").style.display="block";

        loadVendor();

    }
    catch(err){

        console.log(err);

        msg.innerHTML="Unable to connect.";

        btn.disabled=false;

        btn.innerHTML="Login";

    }

}

console.log("Products:", data.products);
console.log("Vendor:", vendor);

//================ CLOUDINARY UPLOAD ================//

async function uploadToCloudinary(

    file,

    preset = UPLOAD_PRESET

){

    const formData = new FormData();

    formData.append("file", file);

    formData.append("upload_preset", preset);

    const response = await fetch(

        `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`,

        {

            method:"POST",

            body:formData

        }

    );

    const data = await response.json();

    if(!response.ok){

        throw new Error(

            data.error?.message ||

            "Cloudinary upload failed."

        );

    }

    return data.secure_url;

}





//================ IMAGE PREVIEW ================//

function previewImage(input,imageId){

    if(!input.files.length) return;

    const reader=new FileReader();

    reader.onload=function(e){

        document.getElementById(imageId).src=e.target.result;

    };

    reader.readAsDataURL(input.files[0]);

}

    previewImage(this,"cover");

    try{

        await uploadToCloudinary(this.files[0]);

        const response=await fetch("/update-cover",{

            method:"POST",

            headers:{

                "Content-Type":"application/json"

            body:JSON.stringify({

                email:vendor.email,

                coverImage:imageUrl

            })

        });

        if(!response.ok){

    "vendor",

);

        return;

    }

    const btn=this;

    btn.disabled=true;

    btn.innerHTML="Saving...";

    try{

        const response=await fetch("/update-business-name",{

            method:"POST",

            headers:{

                "Content-Type":"application/json"

            },

            body:JSON.stringify({

                email:vendor.email,

        const data=await response.json();

//================ PRODUCT IMAGE ================//

let productImageFile = null;

const productImageInput = document.getElementById("productImageInput");
const productImagePreview = document.getElementById("productImagePreview");
const createProductBtn = document.getElementById("createProductBtn");

if (productImageInput && productImagePreview) {

    productImagePreview.addEventListener("click", () => {
        productImageInput.click();
    });

    productImageInput.addEventListener("change", (e) => {

        const file = e.target.files[0];
        if (!file) return;

        productImageFile = file;

        productImagePreview.innerHTML =
            `<img src="${URL.createObjectURL(file)}" alt="Product">`;

        const plus = document.getElementById("productPlus");
        if (plus) plus.style.display = "none";
    });

}


//================ CREATE PRODUCT ================//

if (createProductBtn) {

    createProductBtn.addEventListener("click", async () => {

    if (createProductBtn.disabled) return;

    try {

        if (!productImageFile) {
            showProductMessage("Select a product image.", "error");
            return;
        }

        const title = document.getElementById("productTitle").value.trim();
        const category = document.getElementById("productCategory").value;
        const description = document.getElementById("productDescription").value.trim();
        const quantity = document.getElementById("productQuantity").value;
        const unit = document.getElementById("productUnit").value;
        const price = document.getElementById("productPrice").value;

        if (!title) {
            showProductMessage("Enter product title.", "error");
            return;
        }

        if (!category) {
            showProductMessage("Select a category.", "error");
            return;
        }

        if (!price) {
            showProductMessage("Enter the product price.", "error");
            return;
        }

        // Disable button
        createProductBtn.disabled = true;
        createProductBtn.textContent = "Uploading...";

        const image = await uploadToCloudinary(
            productImageFile,
            "product_images"
        );

        const response = await fetch("/products", {

            method: "POST",

            headers: {
                "Content-Type": "application/json"
            },

            body: JSON.stringify({
                business_id: vendor.id,
                title,
                category,
                description,
                quantity,
                unit,
                price,
                image
            })

        });

        const data = await response.json();

        if (!response.ok) {

            showProductMessage(data.message || "Unable to create product.", "error");

            createProductBtn.disabled = false;
            createProductBtn.textContent = "Create Product";

            return;
        }

        showProductMessage("Product created successfully!", "success");

        // Let the user see the success message
        await new Promise(resolve => setTimeout(resolve, 1000));

        // Reset form
        productImageFile = null;
        productImageInput.value = "";
        productImagePreview.innerHTML = `
    <span id="productPlus">+</span>
`;

        const plus = document.getElementById("productPlus");
        if (plus) plus.style.display = "";

        document.getElementById("productTitle").value = "";
        document.getElementById("productCategory").selectedIndex = 0;
        document.getElementById("productDescription").value = "";
        document.getElementById("productQuantity").value = "";
        document.getElementById("productUnit").selectedIndex = 0;
        document.getElementById("productPrice").value = "";

        createProductBtn.disabled = false;
        createProductBtn.textContent = "Create Product";

        if (typeof productModal !== "undefined") {
            productModal.style.display = "none";
        }

        loadProducts();

    }

    catch (err) {

        console.error(err);

        showProductMessage("Unable to create product.", "error");

        createProductBtn.disabled = false;
        createProductBtn.textContent = "Create Product";

    }

  });

}

//================ IMAGE PREVIEW ================//

function previewImage(input, imageId) {

    if (!input.files.length) return;

    const reader = new FileReader();

    reader.onload = function (e) {

        const img = document.getElementById(imageId);

        if (!img) return;

        img.src = e.target.result;

        if (imageId === "productImagePreview") {

            const plus = document.getElementById("productPlus");

            if (plus) {
                plus.style.display = "none";
            }

        }

    };

    reader.readAsDataURL(input.files[0]);

}
