<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nearbys Business Registration</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:Arial,Helvetica,sans-serif;
    background:#f4f4f4;
}

.container{

    width:95%;
    max-width:420px;

    margin:40px auto;

    background:#fff;

    padding:25px;

    border-radius:12px;

    box-shadow:0 0 10px rgba(0,0,0,.12);

}

h2{

    text-align:center;
    color:#009500;
    margin-bottom:25px;

}

label{

    display:block;
    margin-bottom:6px;
    font-weight:bold;

}

input,
select{

    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:16px;

}

button{

    width:100%;
    padding:13px;

    border:none;

    border-radius:6px;

    background:#009500;

    color:#fff;

    font-size:16px;

    cursor:pointer;

}

button:hover{

    background:#007b00;

}

button:disabled{

    background:#4CAF50;
    cursor:default;

}

#deliveryFeeRow{

    display:none;

}

.input-row{

    display:flex;
    align-items:center;
    gap:10px;

}

.input-row input{

    margin-bottom:0;

}

.unit{

    font-weight:bold;
    white-space:nowrap;

}

#result{

    margin-top:20px;

    text-align:center;

    font-weight:bold;

}

.success{

    color:#009500;

}

.error{

    color:red;

}

.preview{
    width:120px;
    height:120px;
    border:2px dashed #ccc;
    border-radius:8px;
    object-fit:cover;
    display:block;
    margin:10px auto 20px;
    background:#f5f5f5;
}    

</style>

</head>

<body>

<div class="container">

<h2>Business Registration</h2>

<label>Profile Picture</label>

<input
type="file"
id="profileImage"
accept="image/*"
onchange="previewImage(this,'profilePreview')">

<img
id="profilePreview"
class="preview"
src="https://via.placeholder.com/120?text=Profile"
alt="Profile Preview">


<label>Cover Picture</label>

<input
type="file"
id="coverImage"
accept="image/*"
onchange="previewImage(this,'coverPreview')">

<img
id="coverPreview"
class="preview"
src="https://via.placeholder.com/120?text=Cover"
alt="Cover Preview">   

<label>Business Name</label>

<input
type="text"
id="businessName"
placeholder="Business Name">

<input
type="hidden"
id="latitude">

<input
type="hidden"
id="longitude">

<button
type="button"
id="locationButton"
onclick="getLocation()">

Retrieve Current Location

</button>

<br><br>

<label>Category</label>

<select id="category">

<option value="">Select Category</option>

<option value="Grocery">Grocery</option>

<option value="Cafeteria">Cafeteria</option>

<option value="Restaurant">Restaurant</option>

<option value="Other">Other</option>

</select>

<label>Email</label>

<input
type="email"
id="email"
placeholder="Email Address">

<label>Password</label>

<input
type="password"
id="password"
placeholder="Enter Password">

<label>Confirm Password</label>

<input
type="password"
id="confirmPassword"
placeholder="Confirm Password">
    
<label>WhatsApp</label>

<input
type="tel"
id="whatsapp"
placeholder="WhatsApp Number">

<button onclick="submitForm()">

Register Business

</button>

<div id="result"></div>

<div style="text-align:center;margin-top:15px;">

Already Registered?

<a href="vendors.html" style="color:#009500;font-weight:bold;text-decoration:none;">

Login

</a>

</div>
    
</div>

<script>

function previewImage(input, previewId){

    const preview=document.getElementById(previewId);

    if(input.files && input.files[0]){

        const reader=new FileReader();

        reader.onload=function(e){

            preview.src=e.target.result;

        };

        reader.readAsDataURL(input.files[0]);

    }

}
    
function getLocation(){

    if(!navigator.geolocation){

        alert("Geolocation is not supported by your device.");
        return;

    }

    const btn=document.getElementById("locationButton");

    btn.disabled=true;
    btn.innerHTML="Retrieving Location...";

    navigator.geolocation.getCurrentPosition(

        function(position){

            document.getElementById("latitude").value=position.coords.latitude;
            document.getElementById("longitude").value=position.coords.longitude;

            btn.innerHTML="✓ Location Received";

        },

        function(){

            btn.disabled=false;
            btn.innerHTML="Retrieve Current Location";

            alert("Unable to retrieve your location.");

        }

    );

}

async function uploadToCloudinary(file){

    if(!file) return "";

    const formData=new FormData();

    formData.append("file",file);

    formData.append("upload_preset","business_images");

    const response=await fetch(
        "https://api.cloudinary.com/v1_1/gb2xbn6d/image/upload",
        {
            method:"POST",
            body:formData
        }
    );

    const data=await response.json();

    if(!response.ok){

        throw new Error("Cloudinary Upload Failed");

    }

    return data.secure_url;

}

async function submitForm(){

    const result=document.getElementById("result");

    result.className="";
    result.innerHTML="";

    const businessName=document.getElementById("businessName").value.trim();

    const latitude=document.getElementById("latitude").value;

    const longitude=document.getElementById("longitude").value;

    const category=document.getElementById("category").value;

    const email=document.getElementById("email").value.trim().toLowerCase();

    const password=document.getElementById("password").value;

    const confirmPassword=document.getElementById("confirmPassword").value;

    let whatsapp=document.getElementById("whatsapp").value.trim();

    const profileFile=document.getElementById("profileImage").files[0];

    const coverFile=document.getElementById("coverImage").files[0];

    whatsapp=whatsapp.replace(/[\s\-()]/g,"");

    if(businessName===""){

        result.className="error";
        result.innerHTML="Please enter Business Name.";
        return;

    }

    if(latitude===""){

        result.className="error";
        result.innerHTML="Please retrieve your location.";
        return;

    }

    if(category===""){

        result.className="error";
        result.innerHTML="Please select a category.";
        return;

    }

    const emailRegex=/^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    if(!emailRegex.test(email)){

        result.className="error";
        result.innerHTML="Please enter a valid email address.";
        return;

    }

    if(!whatsapp.startsWith("+")){

        result.className="error";
        result.innerHTML="WhatsApp number must include the country code (Example: +971501234567).";
        return;

    }

    const phoneRegex=/^\+[1-9]\d{6,14}$/;

    if(!phoneRegex.test(whatsapp)){

        result.className="error";
        result.innerHTML="Please enter a valid WhatsApp number.";
        return;

    }

    if(password.length<6){

    result.className="error";

    result.innerHTML="Password must contain at least 6 characters.";

    return;

}

if(password!==confirmPassword){

    result.className="error";

    result.innerHTML="Passwords do not match.";

    return;

}
    
    try{

        result.className="";
        result.innerHTML="Uploading images...";

        const profileImage=await uploadToCloudinary(profileFile);

        const coverImage=await uploadToCloudinary(coverFile);

        result.innerHTML="Registering Business...";

        const response=await fetch("/register",{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({

                businessName,
                latitude,
                longitude,
                category,
                email,
                password,
                whatsapp,
                profileImage,
                coverImage

            })

        });

        const data=await response.json();

        if(response.ok){

            result.className="success";
            result.innerHTML=data.message;

            document.getElementById("businessName").value="";
            document.getElementById("category").selectedIndex=0;
            document.getElementById("email").value="";
            document.getElementById("password").value="";
            document.getElementById("confirmPassword").value="";
            document.getElementById("whatsapp").value="";
            document.getElementById("latitude").value="";
            document.getElementById("longitude").value="";
            document.getElementById("profileImage").value="";
            document.getElementById("coverImage").value="";
            document.getElementById("profilePreview").src="https://via.placeholder.com/120?text=Profile";
            document.getElementById("coverPreview").src="https://via.placeholder.com/120?text=Cover";
            document.getElementById("locationButton").disabled=false;
            document.getElementById("locationButton").innerHTML="Retrieve Current Location";

        }else{

            result.className="error";
            result.innerHTML=data.message;

        }

    }catch(err){

        console.error(err);

        result.className="error";
        result.innerHTML="Upload or Database Error.";

    }

}

</script>
</body>
  </html>
