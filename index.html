<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Registration</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
}

.container{

width:350px;
margin:70px auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 0 10px #ddd;

}

input{

width:100%;
padding:12px;
margin-bottom:15px;
font-size:16px;
box-sizing:border-box;

}

button{

width:100%;
padding:12px;
font-size:16px;
background:#009500;
color:white;
border:none;
cursor:pointer;

}

button:hover{

background:#007a00;

}

#result{

margin-top:20px;
font-weight:bold;

}

</style>

</head>

<body>

<div class="container">

<h2>User Registration</h2>

<input
type="text"
id="name"
placeholder="Full Name">

<input
type="text"
id="mobile"
placeholder="Mobile Number">

<button onclick="submitForm()">

Submit

</button>

<div id="result"></div>

</div>

<script>

async function submitForm(){

const name=document.getElementById("name").value.trim();

const mobile=document.getElementById("mobile").value.trim();

if(name=="" || mobile==""){

alert("Please enter Name and Mobile");

return;

}

const response=await fetch("/register",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

name,
mobile

})

});

const data=await response.json();

document.getElementById("result").innerHTML=data.message;

}

</script>

</body>

</html>
